image: node:20

definitions:
  caches:
    node: node_modules

pipelines:
  # Runs on every push to any branch
  default:
    - step:
        name: Install & Lint
        caches:
          - node
        script:
          - npm ci
          - npm run lint

  branches:
    # Testing branch — install, lint, test
    testing:
      - step:
          name: Install
          caches:
            - node
          script:
            - npm ci
      - step:
          name: Lint
          caches:
            - node
          script:
            - npm run lint
      - step:
          name: Test
          caches:
            - node
          script:
            - npm test -- --watchAll=false --passWithNoTests

    # Main branch — full pipeline including production build
    main:
      - step:
          name: Install
          caches:
            - node
          script:
            - npm ci
      - step:
          name: Lint
          caches:
            - node
          script:
            - npm run lint
      - step:
          name: Test
          caches:
            - node
          script:
            - npm test -- --watchAll=false --passWithNoTests
      - step:
          name: Build
          caches:
            - node
          script:
            - npm run build
          artifacts:
            - .next/**