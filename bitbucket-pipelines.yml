image: node:20

definitions:
  caches:
    node: node_modules

pipelines:
  # Runs on every push to any branch not listed below
  default:
    - step:
        name: Install & Lint
        caches:
          - node
        script:
          - npm ci
          - npm run lint

  branches:
    # Testing branch — install, lint
    testing:
      - step:
          name: Install & Lint
          caches:
            - node
          script:
            - npm ci
            - npm run lint

    # Main branch — lint then production build
    main:
      - step:
          name: Install & Lint
          caches:
            - node
          script:
            - npm ci
            - npm run lint
      - step:
          name: Build
          caches:
            - node
          script:
            - npm ci
            - npm run build
          artifacts:
            - .next/**